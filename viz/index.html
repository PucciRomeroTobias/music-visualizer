<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NOWARMUP — Music Graph</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="graph-container"></div>

    <!-- Graph type tabs -->
    <div id="graph-type-tabs">
      <button class="type-tab" data-type="artist">ARTISTAS</button>
      <button class="type-tab" data-type="track">TRACKS</button>
    </div>

    <!-- Search bar -->
    <div id="search-bar">
      <input
        type="text"
        id="search-input"
        placeholder="SEARCH ARTIST..."
        autocomplete="off"
      />
      <div id="search-results"></div>
    </div>

    <!-- Controls -->
    <div id="controls-bar">
      <button id="toggle-labels" title="Toggle artist labels">LABELS</button>
      <button id="reset-camera" title="Reset camera to initial position">RESET</button>
      <div id="preset-selector">
        <button class="preset-toggle">Full Scene</button>
        <div class="preset-menu"></div>
      </div>
    </div>

    <!-- Community legend -->
    <div id="legend">
      <div class="legend-title">COMMUNITIES</div>
      <div id="legend-items"></div>
    </div>

    <!-- Detail panel (artist or track) -->
    <div id="detail-panel" class="hidden">
      <button id="detail-close">&times;</button>
      <h2 id="detail-name"></h2>
      <div id="detail-artist-subtitle"></div>
      <div id="detail-platforms"></div>
      <div class="detail-section">
        <div class="detail-label">COMMUNITY</div>
        <div id="detail-community"></div>
      </div>
      <div class="detail-stats" id="detail-stats"></div>
      <div class="detail-section" id="detail-play-section" style="display:none">
        <button id="detail-play-btn" class="track-play" title="Preview">▶</button>
      </div>
      <div class="detail-section" id="detail-tracks-section">
        <div class="detail-label" id="detail-tracks-label">TRACKS</div>
        <ul id="detail-tracks"></ul>
      </div>
      <div class="detail-section">
        <div class="detail-label" id="detail-neighbors-label">CONNECTED ARTISTS</div>
        <ul id="detail-neighbors"></ul>
      </div>
    </div>

    <!-- Loading overlay -->
    <div id="loading">
      <div class="loading-text">LOADING GRAPH...</div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
